# Tells Netlify how to build the site when connected to GitHub.
# On every push to the repo, Netlify runs this and publishes the result.
[build]
  command = "npm run build"
  publish = "dist"

# Single-page app: always serve index.html (the app handles its own screens).
# Real files (sw.js, manifest, icons) are served directly — this only catches
# unknown paths.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# The service worker must never be cached long, or phones get stuck on an old
# version after a deploy.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Serve the web manifest with the correct content type.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
