<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Offline · Company Portal</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: #f9fafb; color: #111827; padding: 24px; text-align: center;
      }
      @media (prefers-color-scheme: dark) { body { background: #030712; color: #f3f4f6; } }
      .card { max-width: 360px; }
      .icon {
        width: 64px; height: 64px; margin: 0 auto 20px; border-radius: 18px;
        background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff;
        display: flex; align-items: center; justify-content: center; font-size: 30px;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.5; color: #6b7280; margin: 0 0 22px; }
      @media (prefers-color-scheme: dark) { p { color: #9ca3af; } }
      button {
        font: inherit; font-weight: 600; font-size: 15px; color: #fff; cursor: pointer;
        background: #2563eb; border: none; border-radius: 10px; padding: 12px 22px; min-height: 44px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">&#9889;</div>
      <h1>You're offline</h1>
      <p>This app needs an internet connection to load your live data. Please reconnect and try again.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
